server:
  port: 8080

spring:
  application:
    name: cyan-backend
  datasource:
    url: ${CYAN_DB_URL}
    username: ${CYAN_DB_USERNAME}
    password: ${CYAN_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  cache:
    type: ${CYAN_CACHE_TYPE:simple}
    cache-names:
      - movies
      - movieRecommendations
  data:
    redis:
      host: ${CYAN_REDIS_HOST:localhost}
      port: ${CYAN_REDIS_PORT:6379}
      password: ${CYAN_REDIS_PASSWORD:}
      timeout: ${CYAN_REDIS_TIMEOUT:2000ms}

application:
  cors:
    allowed-origin-patterns: ${CYAN_ALLOWED_ORIGIN_PATTERNS:https://cyan-streaming.vercel.app,https://*.vercel.app,http://localhost:5173,http://127.0.0.1:5173}
  security:
    jwt:
      secret-key: ${CYAN_JWT_SECRET:cyan-dev-secret-key}
      expiration: ${CYAN_JWT_EXPIRATION:86400000}
